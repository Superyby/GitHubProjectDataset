services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8010:8010"
    restart: unless-stopped

  frontend:
    build:
      context: ./front
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://8.222.230.5:8010}
    ports:
      - "15000:15000"
    depends_on:
      - backend
    restart: unless-stopped
