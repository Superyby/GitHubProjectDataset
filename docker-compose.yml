services:
  mysql:
    image: mysql:8.4
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-github_project_dataset}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4-alpine
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
      redis-server --requirepass "$$REDIS_PASSWORD";
      else redis-server;
      fi'

volumes:
  mysql-data:
  redis-data:
